<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCM Formula Practice — 22 Questions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ede6d8;
    --card: #faf7f2;
    --border: #d4c8b0;
    --accent: #7a5c38;
    --accent2: #a07848;
    --gold-light: #c49a58;
    --text: #3a2e22;
    --text-dim: #8a7660;
    --correct: #3d7a55;
    --correct-bg: rgba(61,122,85,0.10);
    --wrong: #a03830;
    --wrong-bg: rgba(160,56,48,0.10);
    --neutral-bg: rgba(122,92,56,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 0%, rgba(122,92,56,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(122,92,56,0.05) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .subtitle {
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    font-family: 'Source Serif 4', serif;
    font-weight: 300;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }

  .header-desc {
    color: var(--text-dim);
    font-size: 0.95rem;
    font-style: italic;
    margin-top: 0.5rem;
  }

  /* Progress bar */
  .progress-bar-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 2rem 0;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Score summary */
  .score-summary {
    max-width: 860px;
    margin: 1rem auto;
    padding: 0 2rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .score-chip {
    padding: 0.3rem 0.9rem;
    border-radius: 2rem;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .score-chip.answered { background: var(--neutral-bg); color: var(--accent2); border: 1px solid var(--accent); }
  .score-chip.correct { background: var(--correct-bg); color: var(--correct); border: 1px solid var(--correct); }
  .score-chip.wrong { background: var(--wrong-bg); color: var(--wrong); border: 1px solid var(--wrong); }

  /* Question cards */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 2rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem;
    position: relative;
    transition: border-color 0.3s;
  }

  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .q-number {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(122,92,56,0.10);
    border: 1px solid rgba(122,92,56,0.30);
    padding: 0.25rem 0.6rem;
    border-radius: 2px;
    white-space: nowrap;
    margin-top: 2px;
  }

  .q-category {
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 4px;
  }

  .q-stem {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.5rem;
    font-weight: 400;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 1.25rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 0.85rem;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: rgba(0,0,0,0.03);
    transition: all 0.2s ease;
    text-align: left;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: var(--neutral-bg);
  }

  .option.disabled { cursor: default; }

  .option.selected-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
  }

  .option.selected-wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong);
  }

  .option.reveal-correct {
    background: var(--correct-bg);
    border-color: var(--correct);
    opacity: 0.7;
  }

  .option-letter {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 0.85rem;
    min-width: 22px;
    color: var(--text-dim);
    transition: color 0.2s;
    margin-top: 1px;
  }

  .option.selected-correct .option-letter { color: var(--correct); }
  .option.selected-wrong .option-letter { color: var(--wrong); }
  .option.reveal-correct .option-letter { color: var(--correct); }

  .option-text {
    font-size: 0.95rem;
    line-height: 1.55;
    color: var(--text);
  }

  .option-icon {
    margin-left: auto;
    font-size: 1rem;
    min-width: 20px;
    text-align: right;
  }

  /* Explanation box */
  .explanation {
    background: rgba(0,0,0,0.03);
    border-left: 3px solid var(--accent);
    padding: 1.1rem 1.25rem;
    border-radius: 0 3px 3px 0;
    display: none;
    animation: fadeIn 0.35s ease;
  }

  .explanation.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .explanation-title {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    font-weight: 600;
  }

  .exp-row {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    padding: 0.4rem 0;
    font-size: 0.9rem;
    line-height: 1.5;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .exp-row:last-child { border-bottom: none; }

  .exp-opt {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--text-dim);
    min-width: 20px;
  }

  .exp-text { color: var(--text-dim); flex: 1; }
  .exp-text strong { color: var(--text); font-weight: 600; }

  .exp-verdict {
    font-weight: 700;
    font-size: 0.85rem;
  }

  .exp-verdict.ok { color: var(--correct); }
  .exp-verdict.no { color: var(--wrong); }

  .answer-label {
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    margin-top: 1rem;
    color: var(--text-dim);
    text-align: right;
  }

  .answer-label span {
    color: var(--correct);
    font-weight: 700;
  }

  /* Reset button */
  .controls {
    text-align: center;
    padding: 1rem 0 3rem;
  }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent2);
    padding: 0.7rem 2.5rem;
    font-family: 'Source Serif 4', serif;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-reset:hover {
    background: var(--accent);
    color: var(--bg);
  }

  /* Final score */
  .final-score {
    display: none;
    text-align: center;
    padding: 2rem;
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 4px;
    margin: 0 2rem;
    max-width: 860px;
    margin: 0 auto 2rem;
  }

  .final-score.visible { display: block; }

  .final-score h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--gold-light), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  .final-score p {
    color: var(--text-dim);
    font-size: 1rem;
  }

  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding: 1.5rem 1rem 3rem; }
    .q-card { padding: 1.25rem; }
    .score-summary { padding: 0 1rem; }
    .progress-bar-wrap { padding: 1.25rem 1rem 0; }
  }
</style>
</head>
<body>

<header>
  <div class="subtitle">Traditional Chinese Medicine</div>
  <h1>Formula Practice Exam</h1>
  <p class="header-desc">22 clinical cases — select the most appropriate formula</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-meta">
    <span id="prog-label">0 / 22 answered</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
</div>

<div class="score-summary">
  <div class="score-chip answered" id="chip-answered">Answered: 0</div>
  <div class="score-chip correct" id="chip-correct">Correct: 0</div>
  <div class="score-chip wrong" id="chip-wrong">Wrong: 0</div>
</div>

<div class="final-score" id="final-score">
  <h2 id="final-heading">Score: 0 / 22</h2>
  <p id="final-msg"></p>
</div>

<main id="quiz-main"></main>

<div class="controls">
  <button class="btn-reset" onclick="resetQuiz()">Reset All Answers</button>
</div>

<script>
const questions = [
  {
    id: 1,
    category: "Calming Shen",
    stem: "A 19-year-old male has been timid and easily startled since childhood. He experiences excessive dreaming and may awaken from fright. Recently, due to academic stress, his symptoms have worsened. He occasionally has palpitations, fatigue, and dizziness. His tongue is pale with a thin white coating, and his pulse is wiry and thready. Which formula is most appropriate?",
    options: [
      { letter: "A", text: "Gui Pi Tang (Restore the Spleen Decoction)" },
      { letter: "B", text: "An Shen Ding Zhi Wan (Calm the Spirit and Stabilize the Will Pill)" },
      { letter: "C", text: "Wen Dan Tang (Warm the Gallbladder Decoction)" },
      { letter: "D", text: "Ban Xia Shu Mi Tang (Pinellia and Millet Decoction)" },
    ],
    answer: "B",
    explanations: [
      { letter: "A", pattern: "Spleen-heart deficiency", verdict: false, note: "Main symptom is easy startle (heart-gallbladder deficiency), not spleen-heart deficiency." },
      { letter: "B", pattern: "Heart-gallbladder qi deficiency", verdict: true, note: "Timid, easily startled, palpitations → classic heart-gallbladder qi deficiency. An Shen Ding Zhi Wan is the primary formula." },
      { letter: "C", pattern: "Phlegm-heat", verdict: false, note: "No signs of phlegm or heat here." },
      { letter: "D", pattern: "Stomach disharmony", verdict: false, note: "No digestive complaint is the main issue." },
    ]
  },
  {
    id: 2,
    category: "Astringing",
    stem: "Regarding the treatment of deficiency fatigue syndromes, which of the following is most appropriate?\nA. Low back pain, lower abdominal cramping, and difficult urination → Ba Wei Shen Qi Wan\nB. Abdominal urgency, abdominal pain, and nocturnal emission → Da Jian Zhong Tang\nC. Lower abdominal tension, seminal emission, cold genitals → Chai Hu Jia Long Gu Mu Li Tang\nD. Seminal emission or sexual dreams → Suan Zao Ren Tang",
    options: [
      { letter: "A", text: "Low back pain + lower abdominal cramping + difficult urination → Ba Wei Shen Qi Wan" },
      { letter: "B", text: "Abdominal urgency + abdominal pain + nocturnal emission → Da Jian Zhong Tang" },
      { letter: "C", text: "Lower abdominal tension + seminal emission + cold genitals → Chai Hu Jia Long Gu Mu Li Tang" },
      { letter: "D", text: "Seminal emission or sexual dreams → Suan Zao Ren Tang" },
    ],
    answer: "A",
    explanations: [
      { letter: "A", pattern: "Kidney yang deficiency", verdict: true, note: "Ba Wei Shen Qi Wan addresses kidney yang deficiency — low back pain, abdominal cramping, and difficult urination are classic indicators." },
      { letter: "B", pattern: "Interior cold", verdict: false, note: "Da Jian Zhong Tang treats middle-burner cold, not nocturnal emission." },
      { letter: "C", pattern: "Shaoyang", verdict: false, note: "Chai Hu Jia Long Gu Mu Li Tang addresses shaoyang imbalance, not this presentation." },
      { letter: "D", pattern: "Spirit calming", verdict: false, note: "Suan Zao Ren Tang calms the spirit (liver blood deficiency) — not an astringent for seminal emission." },
    ]
  },
  {
    id: 3,
    category: "Qi Circulation",
    stem: "A 68-year-old woman develops a sensation of a foreign body in her throat after an emotional argument. She cannot cough it out or swallow it. This is accompanied by fullness in the chest and hypochondrium. Her tongue is light red with a thick greasy white coating, and her pulse is wiry and slippery. Which formula is most appropriate?",
    options: [
      { letter: "A", text: "Chai Hu Shu Gan San (Bupleurum Powder to Spread the Liver)" },
      { letter: "B", text: "Dan Zhi Xiao Yao San (Augmented Rambling Powder)" },
      { letter: "C", text: "Ban Xia Hou Po Tang (Pinellia and Magnolia Bark Decoction)" },
      { letter: "D", text: "Gan Mai Da Zao Tang (Licorice, Wheat, and Jujube Decoction)" },
    ],
    answer: "C",
    explanations: [
      { letter: "A", pattern: "Qi stagnation (no phlegm)", verdict: false, note: "Chai Hu Shu Gan San moves qi but does not resolve phlegm — the greasy coating and globus sensation indicate phlegm involvement." },
      { letter: "B", pattern: "Liver depression with heat", verdict: false, note: "No heat signs (no red tongue, no yellow coating)." },
      { letter: "C", pattern: "Qi stagnation + phlegm obstruction (Plum-pit qi / Mei He Qi)", verdict: true, note: "Globus sensation triggered by emotion + greasy white coating + wiry-slippery pulse = Plum-pit qi. Ban Xia Hou Po Tang is the classic formula." },
      { letter: "D", pattern: "Zang Zao (emotional/visceral agitation)", verdict: false, note: "Gan Mai Da Zao Tang treats emotional lability and hysteria (Zang Zao), not phlegm-qi obstruction." },
    ]
  },
  {
    id: 4,
    category: "Descending Qi / Vomiting",
    stem: "Which of the following statements regarding the treatment of vomiting is INCORRECT?",
    options: [
      { letter: "A", text: "Dry retching with saliva and headache → Wu Zhu Yu Tang" },
      { letter: "B", text: "Vomiting with borborygmus and epigastric fullness → Ban Xia Xie Xin Tang" },
      { letter: "C", text: "Dry retching with diarrhea → Huang Qin Jia Ban Xia Sheng Jiang Tang" },
      { letter: "D", text: "Vomiting with weak pulse, frequent urination, slight fever, and cold extremities → Si Ni San" },
    ],
    answer: "D",
    explanations: [
      { letter: "A", pattern: "Stomach cold", verdict: true, note: "Correct — Wu Zhu Yu Tang warms the liver-stomach and descends rebellious qi; it is appropriate for cold-type retching with headache." },
      { letter: "B", pattern: "Cold-heat complex", verdict: true, note: "Correct — Ban Xia Xie Xin Tang addresses mixed cold-heat causing epigastric fullness with borborygmus and vomiting." },
      { letter: "C", pattern: "Heat pattern diarrhea + retching", verdict: true, note: "Correct — Huang Qin Jia Ban Xia Sheng Jiang Tang treats heat-type diarrhea with dry retching." },
      { letter: "D", pattern: "Liver qi stagnation", verdict: false, note: "INCORRECT — Si Ni San spreads liver qi and is NOT for vomiting. The presentation (weak pulse, cold extremities, slight fever) suggests yang deficiency, which requires warming yang formulas, not qi-spreading ones." },
    ]
  },
  {
    id: 5,
    category: "Regulating Blood",
    stem: "A 35-year-old woman diagnosed with hyperthyroidism has been treated with Western medicine for 2–3 years. Her palpitations, irritability, insomnia, and tremors have resolved, but thyroid enlargement persists. She has poor appetite and postprandial distension. Her tongue is dark with blood stasis spots, greasy coating, engorged sublingual veins, and a wiry pulse. Which formula is most appropriate?",
    options: [
      { letter: "A", text: "Yi Guan Jian (Linking Decoction)" },
      { letter: "B", text: "Hai Zao Yu Hu Tang (Sargassum Jade Flask Decoction)" },
      { letter: "C", text: "Tian Wang Bu Xin Dan (Heavenly Emperor's Heart-Nourishing Pill)" },
      { letter: "D", text: "Zhi Zi Qing Gan Tang (Gardenia Decoction to Clear the Liver)" },
    ],
    answer: "B",
    explanations: [
      { letter: "A", pattern: "Yin deficiency", verdict: false, note: "Yi Guan Jian nourishes yin and spreads liver qi — no yin-deficiency signs here; the core issue is phlegm and blood stasis." },
      { letter: "B", pattern: "Phlegm-stasis (goiter / Ying)", verdict: true, note: "Persistent thyroid enlargement with dark tongue, stasis spots, engorged sublingual veins, and greasy coating = phlegm-stasis causing goiter. Hai Zao Yu Hu Tang dissolves phlegm and activates blood, specifically indicated for Ying (goiter)." },
      { letter: "C", pattern: "Heart yin deficiency", verdict: false, note: "Heart symptoms have already resolved; yin deficiency is not the current pattern." },
      { letter: "D", pattern: "Liver fire", verdict: false, note: "No active heat/fire signs remain after Western treatment." },
    ]
  },
  {
    id: 6,
    category: "Stop Bleeding (Hematuria)",
    stem: "A 50-year-old male presents with hematuria. Which of the following statements is INCORRECT?",
    options: [
      { letter: "A", text: "Burning urination, irritability, thirst, red face and mouth sores, rapid pulse → Xiao Ji Yin Zi" },
      { letter: "B", text: "Frequent urgent urination, lower abdominal fullness, no desire to drink, slippery rapid pulse → Ba Zheng San" },
      { letter: "C", text: "Frequent urination, sore lower back and knees, five-center heat, thready rapid pulse → Ji Sheng Shen Qi Wan" },
      { letter: "D", text: "Frequent urination, poor appetite, fatigue, loose stool, weak pulse → Wu Bi Shan Yao Wan" },
    ],
    answer: "C",
    explanations: [
      { letter: "A", pattern: "Blood heat", verdict: true, note: "Correct — Xiao Ji Yin Zi clears heat, cools blood, and stops bleeding. Burning urination and heat signs confirm." },
      { letter: "B", pattern: "Damp-heat", verdict: true, note: "Correct — Ba Zheng San clears damp-heat in the lower burner; urgent/frequent urination with no desire to drink fits damp obstruction." },
      { letter: "C", pattern: "Kidney yang deficiency", verdict: false, note: "INCORRECT — Five-center heat, thready rapid pulse, and lower back soreness indicate kidney YIN deficiency with heat, NOT kidney yang deficiency. Ji Sheng Shen Qi Wan tonifies kidney yang — wrong pattern match." },
      { letter: "D", pattern: "Spleen-kidney deficiency", verdict: true, note: "Correct — Poor appetite, fatigue, loose stool, and weak pulse indicate spleen-kidney deficiency; Wu Bi Shan Yao Wan is appropriate." },
    ]
  },
  {
    id: 7,
    category: "Wind-Heat Cough",
    stem: "A 58-year-old male presents with a one-week history of cough, hoarse voice, and thick yellow sputum. His tongue has a thin yellow coating and his pulse is floating and rapid. Which formula is most appropriate?",
    options: [
      { letter: "A", text: "Zhi Sou San (Stop Cough Powder)" },
      { letter: "B", text: "Jing Fang Bai Du San (Schizonepeta and Ledebouriella Powder to Overcome Toxin)" },
      { letter: "C", text: "Xing Su San (Apricot Kernel and Perilla Leaf Powder)" },
      { letter: "D", text: "Sang Ju Yin (Mulberry Leaf and Chrysanthemum Decoction)" },
    ],
    answer: "D",
    explanations: [
      { letter: "A", pattern: "Chronic or mild cough", verdict: false, note: "Zhi Sou San is for lingering or mild cough — not for an acute wind-heat presentation with yellow sputum." },
      { letter: "B", pattern: "Wind-cold exterior", verdict: false, note: "Jing Fang Bai Du San releases wind-cold; here the signs are wind-heat (yellow sputum, floating-rapid pulse, thin yellow coating)." },
      { letter: "C", pattern: "Wind-dryness dry cough", verdict: false, note: "Xing Su San treats cool-dryness with dry cough and little sputum — opposite of the thick yellow sputum here." },
      { letter: "D", pattern: "Wind-heat cough", verdict: true, note: "Floating-rapid pulse + thin yellow coating + yellow sputum + hoarse voice = wind-heat attacking the lung. Sang Ju Yin disperses wind-heat and stops cough." },
    ]
  },
  {
    id: 8,
    category: "Wind-Damp",
    stem: "A 55-year-old woman was exposed to heavy rain without protection. The next day she develops headache, heaviness of the head as if wrapped, heaviness of the body, and loose stool. Her tongue is light red with a greasy white coating, and her pulse is soggy. Which formula is most appropriate?",
    options: [
      { letter: "A", text: "Chuan Xiong Cha Tiao San (Ligusticum Tea-Regulating Powder)" },
      { letter: "B", text: "Ban Xia Bai Zhu Tian Ma Tang (Pinellia, Atractylodes and Gastrodia Decoction)" },
      { letter: "C", text: "Ren Shen Yang Rong Tang (Ginseng Nutritive Decoction)" },
      { letter: "D", text: "Qiang Huo Sheng Shi Tang (Notopterygium Decoction to Overcome Dampness)" },
    ],
    answer: "D",
    explanations: [
      { letter: "A", pattern: "Wind-cold headache", verdict: false, note: "Chuan Xiong Cha Tiao San disperses wind-cold; no dampness component." },
      { letter: "B", pattern: "Internal phlegm-damp", verdict: false, note: "Ban Xia Bai Zhu Tian Ma Tang addresses internally generated phlegm-damp; this is an external damp invasion after rain exposure." },
      { letter: "C", pattern: "Qi-blood deficiency", verdict: false, note: "No deficiency signs; onset is acute and clearly tied to external exposure." },
      { letter: "D", pattern: "Wind-damp exterior", verdict: true, note: "External wind-damp (after rain exposure): head wrapped-heaviness, body heaviness, loose stool, soggy pulse, greasy white coating. Qiang Huo Sheng Shi Tang is the primary formula for external wind-damp." },
    ]
  },
  {
    id: 9,
    category: "Phlegm-Heat",
    stem: "A 38-year-old male enjoys beer, cold drinks, smokes heavily, and rarely exercises. He has high cholesterol, excessive phlegm, chest oppression, afternoon heaviness, insomnia with dreams, frequent belching, and slight constipation. His tongue coating is yellow and greasy, and his pulse is slippery and rapid. Which formula is most appropriate?",

let state = {};

function init() {
  state = {};
  questions.forEach(q => { state[q.id] = null; });
  renderAll();
}

function renderAll() {
  const main = document.getElementById('quiz-main');
  main.innerHTML = '';
  questions.forEach(q => main.appendChild(renderCard(q)));
  updateProgress();
}

function renderCard(q) {
  const div = document.createElement('div');
  div.className = 'q-card';
  div.id = `card-${q.id}`;

  const answered = state[q.id];
  if (answered) {
    div.classList.add(answered === q.answer ? 'answered-correct' : 'answered-wrong');
  }

  div.innerHTML = `
    <div class="q-header">
      <div>
        <div class="q-number">Q${q.id}</div>
      </div>
      <div>
        <div class="q-category">${q.category}</div>
        <div class="q-stem">${q.stem.replace(/\n/g, '<br>')}</div>
      </div>
    </div>
    <div class="options" id="opts-${q.id}">
      ${q.options.map(opt => renderOption(q, opt)).join('')}
    </div>
    <div class="explanation ${answered ? 'visible' : ''}" id="exp-${q.id}">
      <div class="explanation-title">Explanation</div>
      ${q.explanations.map(e => `
        <div class="exp-row">
          <div class="exp-opt">${e.letter}.</div>
          <div class="exp-text"><strong>${e.pattern}</strong> — ${e.note}</div>
          <div class="exp-verdict ${e.verdict ? 'ok' : 'no'}">${e.verdict ? '✓' : '✗'}</div>
        </div>
      `).join('')}
      <div class="answer-label">Correct Answer: <span>${q.answer}</span></div>
    </div>
  `;

  return div;
}

function renderOption(q, opt) {
  const answered = state[q.id];
  let cls = 'option';
  let icon = '';

  if (answered) {
    cls += ' disabled';
    if (opt.letter === answered) {
      cls += answered === q.answer ? ' selected-correct' : ' selected-wrong';
      icon = answered === q.answer ? '✓' : '✗';
    } else if (opt.letter === q.answer && answered !== q.answer) {
      cls += ' reveal-correct';
      icon = '✓';
    }
  }

  const clickAttr = answered ? '' : `onclick="pick(${q.id}, '${opt.letter}')"`;

  return `
    <div class="${cls}" ${clickAttr}>
      <div class="option-letter">${opt.letter}.</div>
      <div class="option-text">${opt.text}</div>
      <div class="option-icon">${icon}</div>
    </div>
  `;
}

function pick(qid, letter) {
  if (state[qid] !== null) return;
  state[qid] = letter;

  const q = questions.find(q => q.id === qid);
  const card = document.getElementById(`card-${qid}`);
  const opts = document.getElementById(`opts-${qid}`);
  const exp = document.getElementById(`exp-${qid}`);

  // Update card class
  card.classList.add(letter === q.answer ? 'answered-correct' : 'answered-wrong');

  // Re-render options
  opts.innerHTML = q.options.map(opt => renderOption(q, opt)).join('');

  // Show explanation
  exp.classList.add('visible');

  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const answered = Object.values(state).filter(v => v !== null).length;
  const correct = questions.filter(q => state[q.id] === q.answer).length;
  const wrong = answered - correct;

  document.getElementById('prog-label').textContent = `${answered} / ${total} answered`;
  document.getElementById('prog-pct').textContent = Math.round(answered / total * 100) + '%';
  document.getElementById('progress-fill').style.width = (answered / total * 100) + '%';
  document.getElementById('chip-answered').textContent = `Answered: ${answered}`;
  document.getElementById('chip-correct').textContent = `Correct: ${correct}`;
  document.getElementById('chip-wrong').textContent = `Wrong: ${wrong}`;

  const fs = document.getElementById('final-score');
  if (answered === total) {
    fs.classList.add('visible');
    document.getElementById('final-heading').textContent = `Final Score: ${correct} / ${total}`;
    const pct = Math.round(correct / total * 100);
    let msg = pct >= 90 ? '🏆 Excellent! Outstanding TCM pattern recognition.' :
              pct >= 75 ? '👍 Good work! Review the explanations for missed questions.' :
              pct >= 60 ? '📖 Keep practicing — review the explanations carefully.' :
              '💪 Keep studying — revisit the reasoning for each question.';
    document.getElementById('final-msg').textContent = `${pct}% — ${msg}`;
    fs.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    fs.classList.remove('visible');
  }
}

function resetQuiz() {
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
